name: "Maintain: Update Flake Lock"

on:
  schedule:
    # 02:00 UTC is safe. It allows ~1-2 hours for this job to run
    # before your hosts auto-upgrade at 04:00 local.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      include_lix_module:
        description: "Also update lix-module"
        required: false
        default: false
        type: boolean
      include_lanzaboote:
        description: "Also update lanzaboote"
        required: false
        default: false
        type: boolean

jobs:
  update-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=
            substituters = https://cache.nixos.org https://nix-community.cachix.org

      - name: Update flake inputs
        id: update
        shell: bash
        run: |
          set -euo pipefail

          extra_inputs=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_lix_module }}" == "true" ]]; then
            extra_inputs+=(lix-module)
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.include_lanzaboote }}" == "true" ]]; then
            extra_inputs+=(lanzaboote)
          fi

          nix flake update \
            nixpkgs nixpkgs-unstable nixos-hardware \
            home-manager sops-nix disko impermanence \
            winapps preload-ng \
            "${extra_inputs[@]}" \
            --accept-flake-config

          echo "nixpkgs_rev=$(nix flake metadata --json | jq -r '.locks.nodes.nixpkgs.locked.rev[0:7]')" >> "$GITHUB_OUTPUT"

      - name: Format Nix code
        run: find . -name '*.nix' -exec nix fmt -v {} +

      - name: Verify configurations
        shell: bash
        run: |
          set -euo pipefail

          nix flake check --all-systems --impure --keep-going

          for host in yoga latitude nix-media; do
            echo "::group::Verifying $host"
            nix build ".#nixosConfigurations.${host}.config.system.build.toplevel" --dry-run --impure
            echo "::endgroup::"
          done

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            chore(flake): update inputs & format

            nixpkgs: ${{ steps.update.outputs.nixpkgs_rev }}
          file_pattern: flake.lock **/*.nix
